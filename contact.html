<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles/styles.css">
    <title>Contact - Mice Make Soups</title>
</head>

<body>

  <header>
    <img src="./images/micemakesoups.png" alt="Logo of a mouse stirring a large pot of soup" width="100" height="100">
    <h1>Mice Make Soups</h1>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="contact">
      <h1>Contact Us</h1>
      <p>Have questions or feedback? We'd love to hear from you!</p>
      <!-- I let the form below autofill because it was easier than manually filling it out, and now know about the textarea form and also that you can make some entries required. -->
      <form>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <button type="submit">Submit</button>
      </form>
    </section>
  </main>

  <footer>
    <p>Website designed by Zalia Rath</p>
    <a href="#">Instagram</a>
    <a href="#">Facebook</a>
    <a href="#">TikTok</a>
  </footer>

</body>

</html>
